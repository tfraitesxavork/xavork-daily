<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XavorkBusiness Daily Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#D4A017;--gold2:#F0C040;}
body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 50px;font-family:'Barlow',sans-serif;color:#fff;}
#banner{width:100%;max-width:540px;background:#1a1000;border:1px solid rgba(212,160,23,.4);padding:14px 16px;margin-bottom:20px;border-radius:4px;display:flex;flex-direction:column;gap:8px;}
#banner label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}
#banner-row{display:flex;gap:8px;}
#keyinput{flex:1;background:#0a0a0a;border:1px solid rgba(212,160,23,.3);color:#fff;padding:7px 12px;font-family:'Barlow',sans-serif;font-size:.75rem;outline:none;}
#keyinput::placeholder{color:rgba(255,255,255,.25);}
#savebtn{background:var(--gold);color:#000;border:none;padding:7px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
#model-row{display:flex;align-items:center;gap:8px;}
#model-row label{font-size:.6rem;color:rgba(255,255,255,.4);text-transform:uppercase;white-space:nowrap;}
#modelinput{flex:1;background:#0a0a0a;border:1px solid rgba(212,160,23,.2);color:#fff;padding:5px 10px;font-family:'Barlow',sans-serif;font-size:.7rem;outline:none;}
#hint{font-size:.6rem;color:rgba(255,255,255,.3);line-height:1.5;}
#hint a{color:var(--gold);text-decoration:none;}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.hdr img{width:40px;height:40px;object-fit:contain;border-radius:6px;}
.hdr-txt{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold);letter-spacing:.12em;}
.carousel{width:100%;max-width:540px;}
.slide{width:100%;aspect-ratio:5/4;display:none;flex-direction:column;overflow:hidden;position:relative;background:#080808;}
.slide.active{display:flex;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.slide.cover{background:#050505;justify-content:flex-end;}
.cv-bg{position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 60% 30%,rgba(212,160,23,.18),transparent 65%),radial-gradient(ellipse 60% 60% at 20% 80%,rgba(212,160,23,.08),transparent 55%);}
.cv-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(212,160,23,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(212,160,23,.06) 1px,transparent 1px);background-size:40px 40px;}
.cv-body{position:relative;z-index:2;padding:24px 28px 22px;}
.cv-eye{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.cv-eye img{width:28px;height:28px;object-fit:contain;border-radius:4px;}
.cv-eye-txt{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.cv-h{font-family:'Bebas Neue',sans-serif;font-size:3.8rem;line-height:.92;color:#fff;margin-bottom:10px;}
.cv-h .a{color:var(--gold);}
.cv-sub{font-size:.68rem;color:rgba(255,255,255,.4);margin-bottom:14px;}
.cv-badge{display:inline-block;background:var(--gold);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;}
.slide.news{background:#111;}
.s-img{flex:0 0 44%;position:relative;overflow:hidden;}
.s-img img{width:100%;height:100%;object-fit:cover;opacity:.85;display:block;}
.s-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;}
.s-img-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 40%,rgba(8,8,8,.8));}
.cat{position:absolute;top:10px;left:10px;background:var(--gold);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;z-index:2;}
.num{position:absolute;top:10px;right:10px;font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:rgba(255,255,255,.35);z-index:2;}
.s-body{flex:1;padding:13px 16px;display:flex;flex-direction:column;justify-content:space-between;}
.s-hl{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;line-height:1;color:#fff;margin-bottom:6px;}
.s-txt{font-size:.67rem;line-height:1.55;color:rgba(255,255,255,.58);margin-bottom:6px;flex:1;}
.stat-row{display:flex;gap:7px;margin-bottom:6px;}
.stat-box{background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);padding:5px 9px;flex:1;}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold2);line-height:1;}
.stat-l{font-size:.5rem;color:rgba(255,255,255,.38);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
.q-strip{border-left:2px solid var(--gold);padding:4px 10px;margin-bottom:6px;background:rgba(212,160,23,.04);}
.q-strip p{font-size:.63rem;font-style:italic;color:rgba(255,255,255,.6);line-height:1.35;margin:0;}
.q-strip span{display:block;font-size:.52rem;color:var(--gold);margin-top:2px;}
.s-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,.07);padding-top:6px;}
.s-brand{display:flex;align-items:center;gap:5px;}
.s-brand img{width:12px;height:12px;object-fit:contain;border-radius:2px;}
.s-brand span{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);}
.s-src{font-size:.52rem;color:rgba(255,255,255,.22);}
.slide.cta{background:#050505;align-items:center;justify-content:center;text-align:center;}
.cta-bg{position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 50%,rgba(212,160,23,.12),transparent 65%);}
.cta-in{position:relative;z-index:2;padding:20px;}
.cta-logo{width:68px;height:68px;object-fit:contain;border-radius:10px;margin-bottom:14px;}
.cta-h{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:.95;color:#fff;margin-bottom:7px;}
.cta-h .a{color:var(--gold);}
.cta-b{font-size:.68rem;color:rgba(255,255,255,.42);max-width:260px;margin:0 auto 16px;line-height:1.6;}
.cta-handle{display:inline-block;background:var(--gold);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.1em;padding:7px 20px;}
.nav{display:flex;align-items:center;gap:10px;margin-top:16px;justify-content:center;}
.nb{width:34px;height:34px;border:1px solid rgba(212,160,23,.3);background:rgba(212,160,23,.06);color:var(--gold);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.nb:hover{background:rgba(212,160,23,.18);}
.nb:disabled{opacity:.2;cursor:default;}
.dots{display:flex;gap:4px;}
.dot{width:5px;height:5px;background:rgba(212,160,23,.2);cursor:pointer;border-radius:2px;transition:all .2s;}
.dot.active{background:var(--gold);width:18px;}
.btn-row{display:flex;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap;}
.btn{background:none;border:1px solid rgba(212,160,23,.35);color:var(--gold);padding:8px 18px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .2s;border-radius:2px;}
.btn:hover{background:rgba(212,160,23,.1);}
.btn:disabled{opacity:.4;cursor:default;}
.btn-ghost{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.45);}
.btn-ghost:hover{border-color:rgba(212,160,23,.3);color:var(--gold);background:rgba(212,160,23,.06);}
.spin{display:none;width:13px;height:13px;border:2px solid rgba(212,160,23,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;}
.loading .spin{display:inline-block;}
.loading .btn-icon{display:none;}
@keyframes sp{to{transform:rotate(360deg);}}
.status{font-size:.63rem;color:#888;margin-top:9px;text-align:center;max-width:500px;line-height:1.5;}
.ok{color:#4caf50;}
.err{color:#f44;}
</style>
</head>

var TODAY = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
var CAT_BG = {
  'Tech & AI':'linear-gradient(135deg,#0d1b2a,#1a3a5c)',
  'Finance & Markets':'linear-gradient(135deg,#0a1a0a,#1a3a1a)',
  'Startups':'linear-gradient(135deg,#1a0a2a,#3a1a5c)',
  'Marketing':'linear-gradient(135deg,#2a0a0a,#5c1a1a)'
};
var CAT_EM = {'Tech & AI':'🤖','Finance & Markets':'📈','Startups':'🚀','Marketing':'📣'};
var cur = 0;
var slides = [];

function setStatus(msg, cls) {
  var el = document.getElementById('statusel');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function getKey() {
  return document.getElementById('keyinput').value.trim() || localStorage.getItem('xavork_key') || '';
}

function getModel() {
  return document.getElementById('modelinput').value.trim() || 'anthropic/claude-sonnet-4-5';
}

document.getElementById('savebtn').addEventListener('click', function() {
  var key = document.getElementById('keyinput').value.trim();
  if (!key) { setStatus('Please enter your API key.', 'err'); return; }
  localStorage.setItem('xavork_key', key);
  localStorage.setItem('xavork_model', document.getElementById('modelinput').value.trim());
  setStatus('Saved! Click Refresh News to load live stories.', 'ok');
});

document.getElementById('prev').addEventListener('click', function() { goTo(cur - 1); });
document.getElementById('next').addEventListener('click', function() { goTo(cur + 1); });

document.getElementById('refreshbtn').addEventListener('click', function() { fetchNews(); });
document.getElementById('saveonebtn').addEventListener('click', function() { saveOne(); });
document.getElementById('saveallbtn').addEventListener('click', function() { saveAll(); });

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') goTo(cur + 1);
  if (e.key === 'ArrowLeft') goTo(cur - 1);
});

window.addEventListener('load', function() {
  var k = localStorage.getItem('xavork_key');
  var m = localStorage.getItem('xavork_model');
  if (k) document.getElementById('keyinput').value = k;
  if (m) document.getElementById('modelinput').value = m;
  renderSlides(sampleData());
  if (k) setStatus('API key loaded. Click Refresh News for live stories.', '');
});

function buildCover() {
  return '<div class="slide cover active" id="s0">'
    + '<div class="cv-bg"></div><div class="cv-grid"></div>'
    + '<div class="cv-body">'
    + '<div class="cv-eye"><img src="' + LOGO + '" alt=""><span class="cv-eye-txt">XavorkBusiness &middot; Daily Brief</span></div>'
    + '<div class="cv-h">Today\'s<br>Business<br><span class="a">Intel.</span></div>'
    + '<div class="cv-sub">Tech &amp; AI &middot; Finance &middot; Startups &middot; Marketing</div>'
    + '<div class="cv-badge">' + TODAY + '</div>'
    + '</div></div>';
}

function buildCTA(idx) {
  return '<div class="slide cta" id="s' + idx + '"><div class="cta-bg"></div><div class="cta-in">'
    + '<img class="cta-logo" src="' + LOGO + '" alt="">'
    + '<div class="cta-h">Stay<br><span class="a">Ahead.</span></div>'
    + '<div class="cta-b">Daily business intelligence, startup signals &amp; market-moving news &mdash; curated every morning.</div>'
    + '<div class="cta-handle">@XavorkBusiness</div>'
    + '</div></div>';
}

function buildNews(item, idx, total) {
  var bg = CAT_BG[item.category] || 'linear-gradient(135deg,#1a1a1a,#050505)';
  var em = CAT_EM[item.category] || '📰';
  var imgHTML;
  if (item.imageUrl) {
    imgHTML = '<img src="' + item.imageUrl + '" crossorigin="anonymous" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">'
      + '<div class="s-img-ph" style="display:none;background:' + bg + '">' + em + '</div>';
  } else {
    imgHTML = '<div class="s-img-ph" style="background:' + bg + '">' + em + '</div>';
  }
  var statsHTML = '';
  if (item.stats && item.stats.length) {
    statsHTML = '<div class="stat-row">';
    for (var i = 0; i < item.stats.length; i++) {
      statsHTML += '<div class="stat-box"><div class="stat-v">' + item.stats[i].value + '</div><div class="stat-l">' + item.stats[i].label + '</div></div>';
    }
    statsHTML += '</div>';
  }
  var quoteHTML = '';
  if (item.quote) {
    quoteHTML = '<div class="q-strip"><p>&ldquo;' + item.quote + '&rdquo;</p><span>&mdash; ' + item.quoteSource + '</span></div>';
  }
  return '<div class="slide news" id="s' + idx + '">'
    + '<div class="s-img">' + imgHTML + '<div class="s-img-ov"></div>'
    + '<div class="cat">' + item.category + '</div>'
    + '<div class="num">' + idx + '/' + (total - 1) + '</div></div>'
    + '<div class="s-body">'
    + '<div><div class="s-hl">' + item.headline + '</div><div class="s-txt">' + item.body + '</div></div>'
    + statsHTML + quoteHTML
    + '<div class="s-foot"><div class="s-brand"><img src="' + LOGO + '" alt=""><span>XavorkBusiness</span></div>'
    + '<span class="s-src">' + item.source + '</span></div>'
    + '</div></div>';
}

function renderSlides(items) {
  var total = items.length + 2;
  var html = buildCover();
  for (var i = 0; i < items.length; i++) { html += buildNews(items[i], i + 1, total); }
  html += buildCTA(total - 1);
  document.getElementById('carousel').innerHTML = html;
  slides = document.querySelectorAll('.slide');
  cur = 0;
  for (var i = 0; i < slides.length; i++) { slides[i].classList.toggle('active', i === 0); }
  var d = '';
  for (var i = 0; i < total; i++) { d += '<div class="dot' + (i === 0 ? ' active' : '') + '" data-i="' + i + '"></div>'; }
  document.getElementById('dots').innerHTML = d;
  document.querySelectorAll('.dot').forEach(function(dot) {
    dot.addEventListener('click', function() { goTo(parseInt(this.getAttribute('data-i'))); });
  });
  updateNav();
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  slides[cur].classList.remove('active');
  document.querySelectorAll('.dot')[cur].classList.remove('active');
  cur = idx;
  slides[cur].classList.add('active');
  document.querySelectorAll('.dot')[cur].classList.add('active');
  updateNav();
}

function updateNav() {
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides.length - 1;
}

async function fetchNews() {
  var key = getKey();
  if (!key) { setStatus('Please enter and save your OpenRouter API key first.', 'err'); return; }
  var model = getModel();
  var btn = document.getElementById('refreshbtn');
  btn.classList.add('loading');
  btn.disabled = true;
  setStatus('Searching the web for today's top stories...', '');

  var prompt = 'Today is ' + TODAY + '. You are a business news curator for @XavorkBusiness on Instagram. Find the 5 most viral business news stories from the PAST 24 HOURS across: Tech & AI, Finance & Markets, Startups, Marketing. Return ONLY a raw JSON array with no markdown and no backticks. Start with [ and end with ]. Each item: {"category":"Tech & AI","headline":"max 10 words","body":"2-3 sentences under 55 words","quote":"direct quote or empty string","quoteSource":"name and title or empty string","stats":[{"value":"$2B","label":"Raised"}],"imageUrl":"https://images.unsplash.com/photo-VALID_ID?w=800&q=80","source":"Publication name"}. Use a real relevant Unsplash photo URL for each story. Stats can have 0 to 2 items with real numbers. Return ONLY the JSON array, nothing else.';

  try {
    var res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key,
        'HTTP-Referer': 'https://tfraitesxavork.github.io',
        'X-Title': 'XavorkBusiness Daily Brief'
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 2000,
        messages: [{role: 'user', content: prompt}]
      })
    });

    if (!res.ok) {
      var errData = await res.json().catch(function() { return {}; });
      throw new Error((errData.error && errData.error.message) || 'HTTP ' + res.status);
    }

    var data = await res.json();
    if (data.error) throw new Error(data.error.message);

    var raw = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    if (!raw) throw new Error('No content in response');

    // Strip markdown fences without regex
    var cleaned = raw;
    if (cleaned.indexOf('```') !== -1) {
      var start = cleaned.indexOf('[');
      var end = cleaned.lastIndexOf(']');
      if (start !== -1 && end !== -1) cleaned = cleaned.substring(start, end + 1);
    }

    var s = cleaned.indexOf('[');
    var e = cleaned.lastIndexOf(']');
    if (s === -1 || e === -1) throw new Error('No JSON array found in response');

    var parsed = JSON.parse(cleaned.substring(s, e + 1));
    if (!parsed.length) throw new Error('Empty stories array returned');

    renderSlides(parsed);
    setStatus('Live news loaded at ' + new Date().toLocaleTimeString() + ' — images loading!', 'ok');

  } catch (err) {
    setStatus('Error: ' + err.message, 'err');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function saveOne() {
  setStatus('Saving slide ' + (cur + 1) + '...', '');
  html2canvas(slides[cur], {scale: 3, useCORS: true, allowTaint: true, backgroundColor: '#080808'}).then(function(canvas) {
    var a = document.createElement('a');
    a.download = 'xavork-slide-' + (cur + 1) + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    setStatus('Slide ' + (cur + 1) + ' saved!', 'ok');
  }).catch(function(e) { setStatus('Save failed: ' + e.message, 'err'); });
}

function saveAll() {
  var total = slides.length;
  var i = 0;
  function next() {
    if (i >= total) { setStatus('All ' + total + ' slides saved!', 'ok'); return; }
    setStatus('Saving ' + (i + 1) + ' of ' + total + '...', '');
    var el = slides[i];
    var hidden = i !== cur;
    if (hidden) {
      el.style.cssText = 'display:flex!important;position:fixed;top:-9999px;left:0;width:540px;aspect-ratio:5/4;flex-direction:column;overflow:hidden;';
    }
    html2canvas(el, {scale: 3, useCORS: true, allowTaint: true, backgroundColor: '#080808'}).then(function(canvas) {
      if (hidden) el.style.cssText = '';
      var a = document.createElement('a');
      a.download = 'xavork-slide-' + (i + 1) + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      i++;
      setTimeout(next, 800);
    }).catch(function() {
      if (hidden) el.style.cssText = '';
      i++;
      setTimeout(next, 800);
    });
  }
  next();
}
